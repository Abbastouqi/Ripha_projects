<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — ProctorAI</title>
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='css/TrStudent.css')}}">
    <style>
        /* Stats strip */
        .box-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 24px 0;
        }
        .box-info li {
            padding: 22px 20px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
        }
        .box-info li .bx {
            font-size: 36px;
            color: #5f9ea0;
        }
        .box-info li .info p { font-size: 22px; font-weight: 700; color: #342E37; }
        .box-info li .info span { font-size: 13px; color: #aaa; }

        /* Exam cards */
        .exams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
            margin-top: 10px;
        }
        .exam-card {
            background: #fff;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform .2s;
        }
        .exam-card:hover { transform: translateY(-4px); }
        .exam-card h3 { font-size: 17px; font-weight: 700; color: #342E37; margin: 0; }
        .exam-card .meta { font-size: 13px; color: #888; display: flex; gap: 14px; flex-wrap: wrap; }
        .exam-card .meta span { display: flex; align-items: center; gap: 4px; }
        .exam-card .code-badge {
            display: inline-block; padding: 3px 12px;
            background: #e8f7f7; color: #5f9ea0;
            border-radius: 20px; font-size: 13px; font-weight: 700;
            letter-spacing: .5px;
        }
        .btn-take {
            margin-top: auto; padding: 10px 0;
            background: #5f9ea0; color: #fff; border: none;
            border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; text-decoration: none; text-align: center;
            display: block; transition: background .2s;
        }
        .btn-take:hover { background: #4a8082; }
        .btn-submitted {
            margin-top: auto; padding: 10px 0;
            background: #eee; color: #aaa; border: none;
            border-radius: 30px; font-size: 14px;
            text-align: center; display: block; cursor: default;
        }
        .empty-state {
            text-align: center; padding: 60px 20px; color: #aaa;
        }
        .empty-state .bx { font-size: 56px; }
        .empty-state p { margin-top: 10px; font-size: 15px; }

        /* Manual code entry */
        .code-entry {
            background: #fff; border-radius: 16px; padding: 22px;
            margin-bottom: 28px; display: flex; gap: 12px; align-items: center;
            flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,0,0,.07);
        }
        .code-entry input {
            flex: 1; min-width: 160px; padding: 10px 16px;
            border: 2px solid #ddd; border-radius: 30px;
            font-size: 15px; text-transform: uppercase; letter-spacing: 2px;
            outline: none; transition: border .2s;
        }
        .code-entry input:focus { border-color: #5f9ea0; }
        .code-entry button {
            padding: 10px 24px; background: #5f9ea0; color: #fff;
            border: none; border-radius: 30px; font-size: 14px;
            font-weight: 600; cursor: pointer;
        }
        .section-title {
            font-size: 20px; font-weight: 700; color: #342E37; margin-bottom: 14px;
        }
        #codeMsg { font-size: 13px; color: #e74c3c; margin-left: 4px; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <section id="sidebar">
        <a href="#" class="brand">
            <i class='bx bxs-shield-alt-2'></i>
            <span class="text">ProctorAI</span>
        </a>
        <ul class="side-menu top">
            <li class="active">
                <a href="/student/dashboard">
                    <i class='bx bxs-dashboard'></i>
                    <span class="text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/logout">
                    <i class='bx bxs-log-out-circle'></i>
                    <span class="text">Logout</span>
                </a>
            </li>
        </ul>
    </section>

    <!-- CONTENT -->
    <section id="content">
        <nav>
            <i class='bx bx-menu'></i>
            <span class="text">Welcome, {{ student_name }}!</span>
        </nav>

        <main>
            <div class="head-title">
                <div class="left">
                    <h1>My Exams</h1>
                    <ul class="breadcrumb">
                        <li><a href="#">Dashboard</a></li>
                        <li><i class='bx bx-chevron-right'></i></li>
                        <li><a class="active" href="#">Exams</a></li>
                    </ul>
                </div>
            </div>

            <!-- Stats -->
            <ul class="box-info" id="stats">
                <li>
                    <i class='bx bxs-book-open'></i>
                    <div class="info">
                        <p id="statAvailable">—</p>
                        <span>Available Exams</span>
                    </div>
                </li>
                <li>
                    <i class='bx bxs-check-circle'></i>
                    <div class="info">
                        <p id="statTaken">—</p>
                        <span>Exams Taken</span>
                    </div>
                </li>
                <li>
                    <i class='bx bxs-time'></i>
                    <div class="info">
                        <p id="statPending">—</p>
                        <span>Pending</span>
                    </div>
                </li>
            </ul>

            <!-- Manual code entry -->
            <div class="code-entry">
                <i class='bx bxs-key' style="font-size:24px;color:#5f9ea0;"></i>
                <strong style="white-space:nowrap;">Enter Exam Code</strong>
                <input type="text" id="examCodeInput" placeholder="e.g. ABC123" maxlength="6">
                <button onclick="startByCode()">Start Exam</button>
                <span id="codeMsg"></span>
            </div>

            <!-- Exam cards -->
            <p class="section-title">Available Exams</p>
            <div class="exams-grid" id="examsGrid">
                <div class="empty-state" id="loadingMsg">
                    <i class='bx bx-loader-circle bx-spin'></i>
                    <p>Loading exams…</p>
                </div>
            </div>
        </main>
    </section>

    <script>
        async function loadExams() {
            const grid = document.getElementById('examsGrid');
            try {
                const res = await fetch('/api/student/exams');
                const exams = await res.json();
                grid.innerHTML = '';

                let available = 0, taken = 0;
                exams.forEach(e => {
                    if (e.submitted) taken++; else available++;
                    grid.appendChild(buildCard(e));
                });
                document.getElementById('statAvailable').textContent = available;
                document.getElementById('statTaken').textContent = taken;
                document.getElementById('statPending').textContent = available;

                if (exams.length === 0) {
                    grid.innerHTML = `<div class="empty-state">
                        <i class='bx bxs-inbox'></i>
                        <p>No exams assigned to you yet.</p>
                    </div>`;
                }
            } catch(err) {
                grid.innerHTML = `<div class="empty-state"><i class='bx bx-error'></i><p>Could not load exams.</p></div>`;
            }
        }

        function buildCard(e) {
            const div = document.createElement('div');
            div.className = 'exam-card';
            div.innerHTML = `
                <h3>${e.title}</h3>
                <span class="code-badge">${e.exam_code}</span>
                <div class="meta">
                    <span><i class='bx bxs-book'></i> ${e.question_count} Questions</span>
                    <span><i class='bx bxs-time'></i> ${e.duration} min</span>
                    ${e.course_code ? `<span><i class='bx bxs-tag'></i> ${e.course_code}</span>` : ''}
                </div>
                ${e.submitted
                    ? `<span class="btn-submitted">✓ Already Submitted</span>`
                    : `<a href="/student/take-exam/${e.exam_code}" class="btn-take">Start Exam</a>`
                }
            `;
            return div;
        }

        function startByCode() {
            const code = document.getElementById('examCodeInput').value.trim().toUpperCase();
            const msg = document.getElementById('codeMsg');
            if (code.length < 4) { msg.textContent = 'Enter a valid exam code.'; return; }
            msg.textContent = '';
            window.location.href = `/student/take-exam/${code}`;
        }

        document.getElementById('examCodeInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') startByCode();
        });

        loadExams();

        // Sidebar toggle
        const toggleSidebar = document.querySelector('#content nav .bx-menu');
        const sidebar = document.getElementById('sidebar');
        if (toggleSidebar) toggleSidebar.addEventListener('click', () => sidebar.classList.toggle('hide'));
    </script>
</body>
</html>
